<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Student Assistant</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🤖 AI Student Assistant</h1>

    <!-- Question Input -->
    <div class="input-section">

        <h3>✏️ Enter your question or problem</h3>

        <textarea
            id="question"
            placeholder="Example: Explain Binary Search with example">
        </textarea>

        <br>

        <button onclick="askAI()">Ask AI</button>
        <button onclick="clearChat()">Clear Chat</button>

    </div>

    <!-- Explanation Section -->
    <div class="solution-section">

        <h3>📘 Here is your detailed explanation</h3>

        <div id="chatBox">
            <div class="ai">
                AI explanation will appear here...
            </div>
        </div>

    </div>

    <!-- Video Section -->
    <div class="video-section">

        <h3>🎥 Detailed video related to that topic</h3>

        <div id="videoBox">
            Video explanation will appear here...
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
